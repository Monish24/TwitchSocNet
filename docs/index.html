<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TwitchSocNet - Community Network</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0e0e10;
            color: #efeff1;
            overflow: hidden;
        }

        #header {
            background: #18181b;
            padding: 20px 40px;
            border-bottom: 3px solid #9147ff;
        }

        h1 {
            color: #9147ff;
            font-size: 28px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .subtitle {
            color: #adadb8;
            font-size: 14px;
            margin-top: 5px;
        }

        #controls {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(24, 24, 27, 0.95);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #2c2c34;
            z-index: 1000;
        }

        .control-group {
            margin-bottom: 15px;
        }

        .control-group label {
            display: block;
            color: #9147ff;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        input[type="range"] {
            width: 200px;
        }

        .control-value {
            color: #efeff1;
            font-size: 14px;
            margin-top: 5px;
        }

        #sidebar {
            position: absolute;
            top: 120px;
            right: 20px;
            width: 320px;
            background: rgba(24, 24, 27, 0.95);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #2c2c34;
            max-height: calc(100vh - 140px);
            overflow-y: auto;
        }

        .sidebar-title {
            color: #9147ff;
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .streamer-name {
            font-size: 20px;
            font-weight: 700;
            color: #efeff1;
            margin-bottom: 10px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #2c2c34;
        }

        .stat-label {
            color: #adadb8;
            font-size: 12px;
        }

        .stat-value {
            color: #efeff1;
            font-size: 14px;
            font-weight: 600;
        }

        .connections-list {
            margin-top: 15px;
        }

        .connection-item {
            padding: 10px;
            background: #1f1f23;
            margin-bottom: 6px;
            border-radius: 6px;
            border-left: 3px solid #9147ff;
        }

        .connection-name {
            font-weight: 600;
            color: #efeff1;
        }

        .connection-count {
            font-size: 11px;
            color: #adadb8;
        }

        .node {
            cursor: pointer;
            transition: all 0.2s;
        }

        .node:hover {
            stroke: #9147ff;
            stroke-width: 3px;
        }

        .link {
            stroke: #3a3a3d;
            stroke-opacity: 0.6;
        }

        .link.highlighted {
            stroke: #9147ff;
            stroke-opacity: 1;
        }

        .node-label {
            font-size: 12px;
            font-weight: 600;
            fill: #efeff1;
            pointer-events: none;
            text-anchor: middle;
            text-shadow: 0 0 4px #0e0e10, 0 0 4px #0e0e10;
        }

        #stats {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }

        .stat-box {
            background: rgba(145, 71, 255, 0.1);
            padding: 10px 15px;
            border-radius: 6px;
            border: 1px solid rgba(145, 71, 255, 0.3);
        }

        .stat-box-label {
            color: #adadb8;
            font-size: 11px;
            text-transform: uppercase;
        }

        .stat-box-value {
            color: #9147ff;
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="header">
        <h1>🎮 TwitchSocNet</h1>
        <div class="subtitle">Viewer Overlap Network - Showing which streamers share audiences</div>
        <div id="stats">
            <div class="stat-box">
                <div class="stat-box-label">Streamers</div>
                <div class="stat-box-value" id="node-count">-</div>
            </div>
            <div class="stat-box">
                <div class="stat-box-label">Connections</div>
                <div class="stat-box-value" id="edge-count">-</div>
            </div>
            <div class="stat-box">
                <div class="stat-box-label">Visible Connections</div>
                <div class="stat-box-value" id="visible-edge-count">-</div>
            </div>
        </div>
    </div>

    <div id="controls">
        <div class="control-group">
            <label>Connection Strength Filter</label>
            <input type="range" id="weight-slider" min="0" max="1000" value="100" step="50">
            <div class="control-value">Min shared viewers: <span id="weight-value">100</span></div>
        </div>
        
        <div class="control-group">
            <label>Node Size</label>
            <input type="range" id="size-slider" min="5" max="30" value="15" step="1">
            <div class="control-value">Size: <span id="size-value">15</span></div>
        </div>
    </div>

    <div id="sidebar" style="display: none;">
        <div class="sidebar-title">Streamer Details</div>
        <div id="sidebar-content"></div>
    </div>

    <svg id="graph"></svg>

    <script>
        const width = window.innerWidth;
        const height = window.innerHeight;
        
        const svg = d3.select("#graph")
            .attr("width", width)
            .attr("height", height);

        const g = svg.append("g");

        const zoom = d3.zoom()
            .scaleExtent([0.1, 4])
            .on("zoom", (event) => {
                g.attr("transform", event.transform);
            });

        svg.call(zoom);

        let allData;
        let simulation;
        let link, node, label;
        let minWeight = 100;
        let nodeSize = 15;

        d3.json("network_data.json").then(data => {
            allData = data;
            
            document.getElementById("node-count").textContent = data.nodes.length;
            document.getElementById("edge-count").textContent = data.edges.length;
            
            renderNetwork();
            
            // Set up controls
            document.getElementById("weight-slider").addEventListener("input", (e) => {
                minWeight = parseInt(e.target.value);
                document.getElementById("weight-value").textContent = minWeight;
                updateNetwork();
            });
            
            document.getElementById("size-slider").addEventListener("input", (e) => {
                nodeSize = parseInt(e.target.value);
                document.getElementById("size-value").textContent = nodeSize;
                node.attr("r", nodeSize);
                label.attr("dy", nodeSize + 12);
            });
        });

        function renderNetwork() {
            const filteredEdges = allData.edges.filter(e => e.weight >= minWeight);
            
            document.getElementById("visible-edge-count").textContent = filteredEdges.length;
            
            simulation = d3.forceSimulation(allData.nodes)
                .force("link", d3.forceLink(filteredEdges)
                    .id(d => d.id)
                    .distance(d => 150 - (d.weight / 50)))
                .force("charge", d3.forceManyBody().strength(-500))
                .force("center", d3.forceCenter(width / 2, height / 2))
                .force("collision", d3.forceCollide().radius(nodeSize + 30));

            link = g.append("g")
                .selectAll("line")
                .data(filteredEdges)
                .join("line")
                .attr("class", "link")
                .attr("stroke-width", d => Math.sqrt(d.weight) / 5);

            node = g.append("g")
                .selectAll("circle")
                .data(allData.nodes)
                .join("circle")
                .attr("class", "node")
                .attr("r", nodeSize)
                .attr("fill", "#9147ff")
                .call(drag(simulation))
                .on("click", (event, d) => showStreamerInfo(d, filteredEdges));

            label = g.append("g")
                .selectAll("text")
                .data(allData.nodes)
                .join("text")
                .attr("class", "node-label")
                .attr("dy", nodeSize + 12)
                .text(d => d.label || d.id);

            simulation.on("tick", () => {
                link
                    .attr("x1", d => d.source.x)
                    .attr("y1", d => d.source.y)
                    .attr("x2", d => d.target.x)
                    .attr("y2", d => d.target.y);

                node
                    .attr("cx", d => d.x)
                    .attr("cy", d => d.y);

                label
                    .attr("x", d => d.x)
                    .attr("y", d => d.y);
            });
        }

        function updateNetwork() {
            const filteredEdges = allData.edges.filter(e => e.weight >= minWeight);
            document.getElementById("visible-edge-count").textContent = filteredEdges.length;
            
            // Update links
            link.data(filteredEdges, d => `${d.source.id}-${d.target.id}`)
                .join(
                    enter => enter.append("line")
                        .attr("class", "link")
                        .attr("stroke-width", d => Math.sqrt(d.weight) / 5),
                    update => update,
                    exit => exit.remove()
                );
            
            simulation.force("link").links(filteredEdges);
            simulation.alpha(0.3).restart();
        }

        function showStreamerInfo(streamer, edges) {
            const connections = edges.filter(e => 
                e.source.id === streamer.id || e.target.id === streamer.id
            ).map(e => {
                const other = e.source.id === streamer.id ? e.target : e.source;
                return { streamer: other, weight: e.weight };
            }).sort((a, b) => b.weight - a.weight);

            const sidebar = document.getElementById("sidebar");
            const content = document.getElementById("sidebar-content");
            
            sidebar.style.display = "block";
            
            content.innerHTML = `
                <div class="streamer-name">${streamer.label || streamer.id}</div>
                
                <div class="stat-row">
                    <span class="stat-label">Connections</span>
                    <span class="stat-value">${connections.length}</span>
                </div>
                
                <div class="connections-list">
                    <div style="color: #9147ff; font-size: 12px; font-weight: 600; margin-bottom: 10px; text-transform: uppercase;">
                        Shared Viewers
                    </div>
                    ${connections.map(c => `
                        <div class="connection-item">
                            <div class="connection-name">${c.streamer.label || c.streamer.id}</div>
                            <div class="connection-count">${c.weight.toLocaleString()} shared viewers</div>
                        </div>
                    `).join('')}
                </div>
            `;

            // Highlight connections
            link.classed("highlighted", d => 
                d.source.id === streamer.id || d.target.id === streamer.id
            );
            
            node.style("opacity", d => 
                d.id === streamer.id || connections.some(c => c.streamer.id === d.id) ? 1 : 0.3
            );
        }

        function drag(simulation) {
            function dragstarted(event) {
                if (!event.active) simulation.alphaTarget(0.3).restart();
                event.subject.fx = event.subject.x;
                event.subject.fy = event.subject.y;
            }

            function dragged(event) {
                event.subject.fx = event.x;
                event.subject.fy = event.y;
            }

            function dragended(event) {
                if (!event.active) simulation.alphaTarget(0);
                event.subject.fx = null;
                event.subject.fy = null;
            }

            return d3.drag()
                .on("start", dragstarted)
                .on("drag", dragged)
                .on("end", dragended);
        }

        // Reset on background click
        svg.on("click", (event) => {
            if (event.target === event.currentTarget) {
                document.getElementById("sidebar").style.display = "none";
                link.classed("highlighted", false);
                node.style("opacity", 1);
            }
        });
    </script>
</body>
</html>
